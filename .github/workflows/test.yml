name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Principe du moindre privilège : repo public, GITHUB_TOKEN read-only par défaut.
# Chaque job peut élargir ses permissions explicitement si besoin.
permissions:
  contents: read

# Évite que plusieurs runs s'empilent sur la même PR (rebase, force-push) — gain
# significatif de minutes CI sur les PR externes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pytest:
    name: pytest (normal + strict)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Pin pytest pour éviter qu'une release majeure casse la CI silencieusement.
          pip install "pytest>=8,<10"
          # Vérifie qu'aucune dépendance n'a de conflit non résolu (résolveur pip permissif).
          pip check

      # Le Makefile est la source de vérité unique des commandes de test (CONTRIBUTING.md
      # documente les mêmes cibles). Évite le drift CI ↔ dev local.
      - name: Run tests (mode tolérant)
        run: make test

      - name: Run tests (mode strict)
        # BUDGETLAB_STRICT=1 fait escalader toute exception handler au lieu d'avaler.
        # Bloque toute régression silencieuse introduite par une PR.
        run: make test-strict

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        # Binaire direct (version pinnée) plutôt que l'action gitleaks-action@v2 :
        # garantit exit 1 sur finding (le comportement de l'action peut varier
        # selon la version et la config licensing).
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
          chmod +x gitleaks

      - name: Run gitleaks
        # Lit automatiquement le .gitleaksignore racine (faux positif IndexNow déjà whitelisté).
        # Utilise la commande exacte du Makefile pour rester aligné avec dev local
        # (l'install gitleaks dans la step précédente fournit le binaire dans $PWD).
        run: PATH="$PWD:$PATH" make secrets-scan
